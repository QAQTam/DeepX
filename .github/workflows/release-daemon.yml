name: Release daemon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            target_id: windows-x86_64
            binary: target/x86_64-pc-windows-msvc/release/deepx-daemon.exe
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            target_id: linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/deepx-daemon
          - os: macos-14
            rust_target: aarch64-apple-darwin
            target_id: macos-arm64
            binary: target/aarch64-apple-darwin/release/deepx-daemon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup target add ${{ matrix.rust_target }}
      - run: cargo build --locked --release -p deepx-daemon --target ${{ matrix.rust_target }}
      - run: node scripts/package-daemon.mjs --target-id ${{ matrix.target_id }} --binary ${{ matrix.binary }} --output dist
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.target_id }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          pattern: daemon-*
          path: dist
          merge-multiple: true
      - run: node scripts/build-release-manifest.mjs --input dist
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes --title "DeepX ${GITHUB_REF_NAME}"
