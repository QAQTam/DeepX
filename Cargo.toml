[workspace]
resolver = "2"
members = [
    "crates/deepx-gate",
    "crates/deepx-config",
    "crates/deepx-msglp",
    "crates/deepx-message",
    "crates/deepx-types",
    "crates/deepx-proto",
    "crates/deepx",
    "crates/deepx-tools",
    "crates/deepx-tui",
    "crates/deepx-session",
    "crates/deepx-tauri/src-tauri",
    "crates/deepx-egui-exp1",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
license = "MIT"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

[workspace.lints.clippy]
unwrap_used = "deny"

[patch.crates-io]
egui = { path = "D:/project/egui/crates/egui" }
egui_extras = { path = "D:/project/egui/crates/egui_extras" }
eframe = { path = "D:/project/egui/crates/eframe" }
epaint = { path = "D:/project/egui/crates/epaint" }
