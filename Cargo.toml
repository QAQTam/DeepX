[workspace]
resolver = "2"
members = [
    "crates/dsx-types",
    "crates/dsx-proto",
    "crates/dsx",
    "crates/dsx-gate",
    "crates/dsx-agent",
    "crates/dsx-tools",
    "crates/dsx-tui",
    "crates/dsx-tauri/src-tauri",
]

[workspace.package]
version = "4.2.0"
edition = "2021"
license = "MIT"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

[workspace.lints.clippy]
unwrap_used = "deny"
let_underscore_drop = "warn"
