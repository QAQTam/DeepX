[workspace]
resolver = "2"
members = [
    "crates/deepx-gate",
    "crates/deepx-config",
    "crates/deepx-msglp",
    "crates/deepx-message",
    "crates/deepx-types",
    "crates/deepx-proto",
    "crates/deepx-tools",
    "crates/deepx-tui",
    "crates/deepx-session",
    "crates/deepx-sed",
    "crates/deepx-tauri/src-tauri",
    "crates/deepx-grep-matcher",
    "crates/deepx-grep-regex",
    "crates/deepx-grep-searcher",
    "crates/deepx-globset",
    "crates/deepx-ignore",
]

[workspace.package]
version = "0.4.0"
edition = "2024"
license = "MIT"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

[workspace.lints.clippy]
unwrap_used = "deny"

