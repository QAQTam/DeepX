[workspace]
resolver = "2"
members = [
    "crates/deepx-gate",
    "crates/deepx-config",
    "crates/deepx-msglp",
    "crates/deepx-message",
    "crates/deepx-types",
    "crates/deepx-proto",
    "crates/deepx",
    "crates/deepx-tools",
    "crates/deepx-tui",
    "crates/deepx-session",
    "crates/deepx-tauri/src-tauri",
]

[workspace.package]
version = "4.2.0"
edition = "2021"
license = "MIT"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

[workspace.lints.clippy]
unwrap_used = "deny"
