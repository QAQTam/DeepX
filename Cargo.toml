[workspace]
resolver = "2"
members = [
    "crates/dsx-types",
    "crates/dsx-proto",
    "crates/dsx",
    "crates/dsx-hp",
    "crates/dsx-agent",
    "crates/dsx-tools",
]

[workspace.package]
version = "4.0.0"
edition = "2021"
license = "MIT"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
