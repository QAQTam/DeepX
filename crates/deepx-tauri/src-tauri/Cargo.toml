[package]
name = "deepx-tauri"
version.workspace = true
edition.workspace = true
description = "DeepX Tauri desktop application"

[[bin]]
name = "deepx-desktop"
path = "src/main.rs"

[lib]
name = "deepx_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
ts-rs = { version = "12", features = ["serde-compat"] }

[dependencies]
tauri = { version = "2", features = ["custom-protocol"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
deepx-client = { path = "../../deepx-client" }
deepx-proto = { path = "../../deepx-proto" }
serde_json = "1"
log = "0.4"
tokio = { version = "1", features = ["sync"] }
[lints]
workspace = true
