[package]
name = "deepx-tauri"
version.workspace = true
edition.workspace = true
description = "DeepX Tauri desktop application"

[[bin]]
name = "deepx-tauri"
path = "src/main.rs"

[lib]
name = "deepx_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
ts-rs = { version = "12", features = ["serde-compat"] }

[dependencies]
tauri = { version = "2", features = ["custom-protocol"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
deepx-msglp = { path = "../../deepx-msglp" }
deepx-config = { path = "../../deepx-config" }
deepx-session = { path = "../../deepx-session" }
deepx-tools = { path = "../../deepx-tools" }
deepx-types = { path = "../../deepx-types" }
deepx-proto = { path = "../../deepx-proto" }
serde_json = "1"
log = "0.4"
git2 = { version = "0.21", features = ["vendored-libgit2"] }
[lints]
workspace = true
