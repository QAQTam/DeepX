[package]
name = "dsx-tauri"
version.workspace = true
edition.workspace = true
description = "DeepX Tauri desktop application"

[lib]
name = "dsx_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
dsx-msglp = { path = "../../dsx-msglp" }
deepx-config = { path = "../../deepx-config" }
dsx-session = { path = "../../dsx-session" }
dsx-types = { path = "../../dsx-types" }
dsx-proto = { path = "../../dsx-proto" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
log = "0.4"

[lints]
workspace = true
