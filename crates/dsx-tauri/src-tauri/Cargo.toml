[package]
name = "dsx-tauri"
version = "4.2.0"
description = "DSX — Tauri GUI frontend"
authors = ["QAQTam"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "dsx_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2", features = [] }
tauri-plugin-log = "2"
tauri-plugin-dialog = "2"
dsx-types = { path = "../../dsx-types" }
dsx-proto = { path = "../../dsx-proto" }

tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }

[lints]
workspace = true
