[package]
name = "dsx-tools"
version.workspace = true
edition.workspace = true
description = "DSX tool execution server — sandboxed IPC process"

[dependencies]
dsx-types = { path = "../dsx-types" }
dsx-proto = { path = "../dsx-proto" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
reqwest = { version = "0.13", default-features = false, features = ["rustls", "json", "blocking"] }
html2text = "0.17"
log = "0.4"
