[package]
name = "dsx-tools"
version.workspace = true
edition.workspace = true
description = "DSX tool execution — library + standalone binary"

[[bin]]
name = "dsx-tools"
path = "src/main.rs"

[dependencies]
dsx-types = { path = "../dsx-types" }
dsx-proto = { path = "../dsx-proto" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
ureq = { version = "3", features = ["json"] }
html2text = "0.17"
log = "0.4"
