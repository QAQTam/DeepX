[package]
name = "dsx-tui"
version.workspace = true
edition.workspace = true
description = "DeepX terminal user interface"

[[bin]]
name = "dsx-tui"
path = "src/main.rs"

[dependencies]
dsx-types = { path = "../dsx-types" }
dsx-proto = { path = "../dsx-proto" }
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
crossterm = { version = "0.28", features = ["bracketed-paste"] }
serde = "1"
serde_json = "1"
anyhow = "1"
ureq = { version = "3", features = ["json"] }
unicode-width = "0.2"
chrono = { version = "0.4", features = ["clock"] }
syntect = "5"

[lints]
workspace = true
